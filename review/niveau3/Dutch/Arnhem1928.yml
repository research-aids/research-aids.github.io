Sources:
  Primary sources:
    - Type of source: "Archief"
      Name: "Nationaal Archief, Den Haag, Ministerie van Binnenlandse Zaken: Afdeling Kunsten en Wetenschappen, nummer toegang 2.04.13, inventarisnummer 1617 - Stukken betreffende de verdeling van door het Rijk aangekochte en overgenomen voorwerpen op de Wereldtentoonstelling (Internationale Koloniale en Uitvoer Tentoonstelling) in Amsterdam"
      Link: 
        - URL: "https://www.nationaalarchief.nl/onderzoeken/archief/2.04.13/invnr/%402.~2.2~2.2.4~2.2.4.1~2.2.4.1.1~2.2.4.1.1.02~1617"
      Description and remarks: "Archief bij het departement Kunsten en Wetenschappen van het Ministerie van Binnenlandse Zaken. Bevat voornamelijk correspondentie over de verdeling van objecten die is gemaakt na afloop van de Wereldtentoonstelling."
    - Type of source: "Archief"
      Name: "Stadsarchief, Amsterdam, nummer toegang 30576 Collectie Stadsarchief Amsterdam: tentoonstellingen, inventarisnummer 43-70 Internationale Koloniale en Algemene Uitvoerhandel Tentoonstelling, Amsterdam, mei - oktober 1883."
      Link:
        - URL: "https://archief.amsterdam/inventarissen/file/49d013d5-0786-db08-da7f-085c767ce025"
      Description and remarks: "Algemeen archief van de Wereldtentoonstelling van 1883 binnen het Stadsarchief Amsterdam. Bevat onder andere de reglementen, de openingstoespraak en reclamemateriaal."
  Secondary sources:
    - Type of source: "Catalogus"
      Name: "Veth, P.J, G.A Wilken, en H.C Klinkert. Catalogus der afdeeling Nederlandsche Koloniën van de internationale koloniale en uitvoerhandel tentoonstelling (van 1 Mei tot ultimo October 1883) te Amsterdam.Leiden: E.J. Brill, 1883."
      Link:
        - URL: "http://hdl.handle.net/1887.1/item:129051"
        - OCLC: "680228146"
      Description and remarks: "Catalogus van de Nederlandse Koloniën-afdeling van de Wereldtentoonstelling, opgesteld door P.J. Veth. De catalogus bestaat uit 3 delen die respectievelijk de drie objectgroepen beschrijven: 'Het  terrein der gekoloniseerde en overheerde gewesten', 'De inlandsche bevolking dier gewesten' en Groep III 'De Europeanen in die gewesten en hunne  betrekkingen tot de inlanders'."
    - Type of source: "Catalogus"
      Name: "Serrurier, Lindor. Catalogus der ethnographische afdeeling van de Internationale Koloniale en Uitvoerhandel Tentoonstelling (van 1 Mei tot ult°. October 1883) te Amsterdam. Leiden: Brill, 1883."
      Link: 
        - URL: "https://books.google.nl/books?id=twNWAAAAcAAJ"
        - OCLC: "1463298534"
        - DOI: "10.1163/9789004589124"
      Description and remarks: "Catalogus van de overige etnografische collecties, buiten die van het Nederlandse koloniale paviljoen om. Opgesteld door de toenmalige directeur van het Rijks Ethnographisch Museum in Leiden, Lindor Serrurier. Bevat onder andere een beschrijving van de collectie van Generaal Pitt Rivers die getoond werd."
    - Type of source: "Boek"
      Name: "Bonaparte, Roland. Les habitants de Suriname: notes recueillies à l’exposition coloniale d’Amsterdam en 1883, 1884."
      Link: 
        - URL: "http://hdl.handle.net/1887.1/item:972422"
        - OCLC: "906298688"
      Description and remarks: "Boek met daarin een collectie aan foto's van de Surinaamse mensen die tentoon werden gesteld tijdens de Wereldtentoonstelling."
    - Type of source: "Dissertatie"
      Name: "Bloembergen, M. ‘Koloniale Vertoningen : De Verbeelding van Nederlands-Indië Op de Wereldtentoonstellingen (1880-1931)’, 2001."
      Link: 
        - URL: "https://dare.uva.nl/search?identifier=261ddb19-419d-489d-a977-0a6e0adf3734"
        - OCLC: "67053775"
      Description and remarks: "Dissertatie uit 2001 die ingaat op de verschillende manieren waarop voormalig Nederlands-Indië werd gerepresenteerd op verschillende wereldtentoonstellingen. Biedt ook gedetailleerde informatie over de wereldtentoonstelling in 1883 in Amsterdam (p. 46-86)."
    - Type of source: "Artikel"
      Name: "Alberdingk Thijm, J.A., 'De waereldtentoonstelling van 1883.' De Gids 47, no. 3 (1883): 292–310."
      Link: 
        - URL: "https://www.dbnl.org/tekst/_gid001188301_01/_gid001188301_01_0084.php"
      Description and remarks: "Artikel van J.A. Alberdink Thijm in tijdschrift De Gids uit 1883 over de wereldtentoonstelling van dat jaar in Amsterdam."

