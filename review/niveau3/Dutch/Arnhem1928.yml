Level: 3

Title: "Indische Tentoonstelling Arnhem (I.T.A.) / Tentoonstelling Oost & West Indië 1928"

Abstract: "In 1883 werd de Internationale Koloniale en Uitvoerhandel Tentoonstelling, of kortweg de Wereldtentoonstelling van 1883, gehouden op wat tegenwoordig het Museumplein in Amsterdam is. Naast een Nederlands paviljoen waar vele objecten uit de oostelijke en westelijke koloniën werden getoond, hadden ook andere landen en bedrijven paviljoens."

