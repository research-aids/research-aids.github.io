    Een deel belandde in de Stadhouderlijke verzamelingen, die in ... werden opgenomenin het Koninklijk Kabinet van Zeldzaamheden (ARTIKEL LEANDRO!). In Frankrijk ging de verzameling Karel X over op het Cabinet d’Histoire naturelle de Versailles (1797 - 1806). Er zijn donaties uit Suriname aan het Koninklijk Kabinet van Zeldzaamheden bekend van ...
