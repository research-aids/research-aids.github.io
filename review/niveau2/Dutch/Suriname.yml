Main-text:
  content: |
    ### Beschrijving
    
    Aan de noordkust van Zuid-Amerika monden verschillende rivieren uit in de Atlantische Oceaan in een gebied dat bekendstaat als de Guyana's – een inheems woord dat waarschijnlijk 'land van vele wateren' betekent. Een van deze rivieren is de Surinamerivier. Ten tijde van de reizen van de Spaanse conquistador Alonso de Ojeda werd dit gebied bewoond door Arowakken, Cariben en Warau. Vanaf de late zestiende eeuw deden zeevaarders uit Engeland, Frankrijk en de Nederlanden het gebied aan, op zoek naar het mythische goudland _El Dorado_, dat volgens Sir Walter Raleigh in de Guyana's te vinden moest zijn. Langs de Surinamerivier werd in 1651 door Sir Francis Willoughby, de Engelse gouverneur van Barbados, een plantagekolonie gesticht. Deze kolonie werd in 1667 tijdens de Tweede Engels-Nederlandse Oorlog door een Zeeuwse vloot veroverd. 
    
    Vanaf 1683 werd Suriname bestuurd door de Sociëteit van Suriname, een particuliere onderneming met in gelijke verhoudingen de West-Indische Compagnie, de familie Van Aerssen van Sommelsdijck en de stad Amsterdam als aandeelhouders. In 1795 gingen de bezittingen van de Sociëteit van Suriname over op de Nederlandse staat, die Suriname – afgezien van twee periodes van Britse bezetting – als kolonie heeft bestuurd tot 1954. In dat laatste jaar aanvaardde Suriname samen met Nederland en de Nederlandse Antillen het Statuut voor het Koninkrijk der Nederlanden, waarmee de dekolonisatie voltooid heette te zijn. In 1975 werd Suriname onafhankelijk.

    De Europese particuliere eigenaren stelden op hun plantages tot slaaf gemaakte inheemsen en Afrikanen te werk. Sommige slaafgemaakten wisten de plantages te ontvluchten en in het binnenland van Suriname vrije samenlevingen te stichten. In 1760 sloot de koloniale overheid een vredesverdrag met een van deze marrongroepen, namelijk met de Okanisi (ook wel Aukaners of Ndyuka). In 1762 en 1769 volgden vredesverdragen met twee andere groepen, de Saamaka en Matawai, terwijl de Aluku (of Boni), de Pamaka en de Kwinti nooit een vredesverdrag sloten.

    Vanaf de achttiende eeuw waren zendelingen van de Evangelische Broedergemeente (EBG) actief in Suriname, vooral onder de Saamaka. In 1865 werd Suriname door paus Pius IX als missiegebied toegewezen aan Nederlandse redemptoristen, die in hun werkzaamheden werden bijgestaan door de Zusters Franciscanessen van Roosendaal en de Fraters van Tilburg. Vanuit de voormalige leprozenkolonie Batavia aan de Coppenamerivier werden inheemsen gekerstend, terwijl de missiestatie Tamarin aan de Cotticarivier het middelpunt werd van de katholieke missie naar de Okanisi.

    ### Verzamelingen Surinaamse voorwerpen in Europa en de Verenigde Staten
    Etnografische objecten werden vanaf het begin van de kolonisatie naar Europa meegenomen. In een in 1796 gepubliceerd verslag van veldtochten tegen marrons, waaraan de Schots-Nederlandse officier [John Gabriël Stedman](https://nl.wikipedia.org/wiki/John_Gabri%C3%ABl_Stedman) tussen 1773 en 1777 deelnam, zijn ook beschrijvingen en illustraties van etnografische voorwerpen opgenomen. Van Stedman is bekend dat hij in 1777 een schenking deed aan de stadhouderlijke verzameling van Willem V en in 1796 achttien Surinaamse 'curiositeiten' schonk aan James Parkinson voor opname in zijn [Leverian collection](https://en.wikipedia.org/wiki/Leverian_collection) in Londen, die in 1806 werd geveild. In het archief van het Koninklijk Kabinet van Zeldzaamheden bevindt zich een inventarisbeschrijving die rechtstreeks is overgenomen uit Stedmans verslag. Op basis hiervan vermoeden antropologen Richard en Sally Price dat een deel van de door Stedman verzamelde voorwerpen uiteindelijk in het Kabinet terecht is gekomen. Het blijft echter vaak moeilijk om een directe koppeling te maken tussen Stedmans beschrijvingen en de voorwerpen in deze collectie.
    
    Een andere belangrijke verzameling uit Suriname werd in 1824 aan het Kabinet geschonken door [Frederik Andreas Kühn](https://www.wikidata.org/wiki/Q132146744), hoofd van de militaire geneeskundige dienst in Suriname. In de begeleidende brief schreef Kühn dat een deel van de voorwerpen afkomstig was van zijn overleden broer, die in 1818 had deelgenomen aan een expeditie naar een marrongemeenschap. Daardoor is het niet altijd eenvoudig de schenking van Kühn te onderscheiden van objecten die eventueel van Stedman afkomstig kunnen zijn. Tussen 1825 en 1835 ontving het Kabinet ook schenkingen uit Suriname van onder anderen [Isaac Bromet](https://www.wikidata.org/wiki/Q137830410), [Dietrich Kanngiesser](https://www.wikidata.org/wiki/Q94852739), [Hendrik Haagen Dieperink](https://www.wikidata.org/wiki/Q122884501) en [Adriaan François Lammens](https://nl.wikipedia.org/wiki/Adriaan_Fran%C3%A7ois_Lammens). Lammens was schoonzoon en bewonderaar van [Gerrit Schouten](https://nl.wikipedia.org/wiki/Gerrit_Schouten) en verantwoordelijk voor de schenking van veel diorama's van Schouten aan het Kabinet.

    Zendelingen en missionarissen brachten eveneens etnografische voorwerpen van Suriname naar Europa. Een van de vroegste verzamelingen werd in 1780 door zendeling [Christlieb Quandt](https://www.wikidata.org/wiki/Q94933152) geschonken aan het rariteitenkabinet van de seminarie van de Evangelische Broedergemeente in Barby. Rond 1857 droeg zendeling [Johann Jansa](https://www.wikidata.org/wiki/Q119700090) een verzameling voorwerpen afkomstig uit de buurt van zendingspost Berg en Dal over aan de archivaris van de Evangelische Broedergemeente in Herrnhut. Veel door Quandt en Jansa verzamelde voorwerpen kwamen later terecht in het in 1878 opgerichte [Völkerkundemuseum Herrnhut](https://voelkerkunde-herrnhut.skd.museum), al vormde de verkoop van etnografica ook een bron van inkomsten voor de Evangelische Broedergemeente. Zo werd een deel van Jansa's collectie in 1861 verkocht aan het etnografisch kabinet van de Koninklijke Pruisische Kunstkamer, dat in 1873 opging in het _Ethnologisches Museum_ van Berlijn. Een collectie van de paters redemptoristen bevindt zich in [Museon-Omniversum](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2Fa124abe580b6a77b82bb3edf0ca7113a). De Fraters van Tilburg legden een omvangrijke [fotocollectie Caribisch Erfgoed](https://stadsmuseumtilburg.nl/collecties?query=*:*&qf%5b%5d=tib_collectionPart_facet:Foto%27s%20Caribisch%20Erfgoed) aan, die inmiddels digitaal toegankelijk is via het Stadsmuseum Tilburg.

    Verdere negentiende-eeuwse verzamelingen omvatten onder meer de collecties [RV-399](https://app.colonialcollections.nl/nl/objects?query=rv-399) en [RV-1054](https://app.colonialcollections.nl/nl/objects?query=rv-1054), bijeengebracht door respectievelijk gouverneur [Cornelis Ascanius van Sypesteyn](https://nl.wikipedia.org/wiki/Cornelis_Ascanius_van_Sypesteyn_(1823-1892)) en administrateur der financiën [Assueer Jacob Schimmelpenninck van der Oye](https://nl.wikipedia.org/wiki/Assueer_Jacob_Schimmelpenninck_van_der_Oye_(1835-1915)). Deze werden in respectievelijk 1883 en 1895 geschonken aan het Rijks Ethnographisch Museum, het huidige [Wereldmuseum Leiden](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2F77c1a0cf982b33b9e88073c4a704049b). Ook het [Etnografisch Museum Artis](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2F44a7a61d62ca8589d6a93e6fde593593) bezat een uitgebreide Surinamecollectie, waaronder een zeldzame _kwakwabangi_. Conservator Cornelis Marinus Pleyte publiceerde hierover in 1896 [een artikel](https://www.digi-hub.de/viewer/image/DE-11-001785756/394/LOG_0381/) in het Duitse tijdschrift _Globus_. De collectie van Artis ging in 1921 over naar het in 1926 geopende museum van het Koloniaal Instituut, het huidige Wereldmuseum Amsterdam, waar zij herkenbaar is aan de serieletters [TM-A](https://app.colonialcollections.nl/nl/objects?query=tm-a&locations=Suriname).

    #### Verkenningen langs de rivieren
    Door goudvondsten in het stroomgebied van de Marowijnerivier nam de internationale belangstelling voor Suriname vanaf de late jaren zeventig van de negentiende eeuw toe. Samen met de Aluku gids en bootsman [Apatou](https://nl.wikipedia.org/wiki/Apatou_(kapitein)) reisde de Franse arts Jules Crevaux in 1877 via de bovenlopen van de Marowijne naar Belém in Brazilië. Crevaux [schonk](https://collections.quaibranly.fr/?state=%7B%22matchAllCriteria%22%3Atrue%2C%22customSearchCriteria%22%3A%5B%7B%22field%22%3A%22%2FRecord%2FConX%2FAlphaSortConX%2C%2FRecord%2FConXother%2FAlphaSort%22%2C%22fieldLabel%22%3A%22%22%2C%22searchValues%22%3A%5B%22%5BCrevaux%2C%20Jules%5D%22%5D%2C%22description%22%3A%22Personne%28s%29%20%3A%20Crevaux%2C%20Jules%22%7D%5D%7D) de voorwerpen die hij tijdens de reis had verzameld aan het _Musée du Trocadéro_ in Parijs, een van de voorlopers van het huidige _Musée du Quai Branly – Jacques Chirac_. Hetzelfde gold voor de [objecten](https://collections.quaibranly.fr/?state=%7B%22matchAllCriteria%22%3Atrue%2C%22customSearchCriteria%22%3A%5B%7B%22field%22%3A%22%2FRecord%2FConX%2FAlphaSortConX%2C%2FRecord%2FConXother%2FAlphaSort%22%2C%22fieldLabel%22%3A%22%22%2C%22searchValues%22%3A%5B%22%5BFournereau%2C%20Lucien%5D%22%5D%2C%22description%22%3A%22Personne%28s%29%20%3A%20Fournereau%2C%20Lucien%22%7D%5D%7D) die Lucien Fournereau in 1882 langs de Marowijne verzamelde. Voorwerpen uit Suriname die waren getoond op de Wereldtentoonstelling van 1878 in Parijs en de [Wereldtentoonstelling van 1883](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2F6ad17cc1c619926c9a449872d3c41b0f) in Amsterdam werden na afloop over verschillende volkenkundige musea verdeeld; in Nederland leverde dat onder meer de series [RV-300](https://app.colonialcollections.nl/nl/objects?query=rv-300) en [RV-370](https://app.colonialcollections.nl/nl/objects?query=rv-370) op. 
    
    Tussen mei 1885 en juli 1886 verbleef [Herman ten Kate](https://nl.wikipedia.org/wiki/Herman_ten_Kate_(antropoloog)) in Suriname om voor het Rijks Ethnographisch Museum de verzameling [RV-581](https://app.colonialcollections.nl/nl/objects?query=rv-581) samen te stellen. In dezelfde periode verzamelde de Leidse hoogleraar geologie Karl Martin bij inheemsen en Saamaka; deze collectie zou in 1949 door zijn weduwe Hillegonda Martin-Icke worden geschonken en in het museum worden opgenomen als serie [RV-2777](https://app.colonialcollections.nl/nl/objects?query=rv-2777). In 1887 gidste Apatou opnieuw een Fransman, namelijk geograaf en koloniaal ambtenaar Henri Coudreau, langs de bovenlopen van de Marowijne. Ook diens verzameling werd [ondergebracht](https://collections.quaibranly.fr/?state=%7B%22matchAllCriteria%22%3Atrue%2C%22customSearchCriteria%22%3A%5B%7B%22field%22%3A%22%2FRecord%2FConX%2FAlphaSortConX%2C%2FRecord%2FConXother%2FAlphaSort%22%2C%22fieldLabel%22%3A%22%22%2C%22searchValues%22%3A%5B%22%5BCoudreau%2C%20Henri%5D%22%5D%2C%22description%22%3A%22Personne%28s%29%20%3A%20Coudreau%2C%20Henri%22%7D%5D%7D) in het _Musée du Trocadéro_. Legerarts [John H. Spitzly](https://www.wikidata.org/wiki/Q137806783) droeg in 1888 een verzameling etnografische voorwerpen uit Suriname over aan het _Berliner Gesellschaft für Anthropologie, Ethnologie und Urgeschichte_.

    De onderzoeksreizen in 1890 van de Duitse Wilhelm Joest en de Zweedse Axel Klinckowström resulteerden in schenkingen aan respectievelijk het _Ethnologisches Museum_ in Berlijn en het _Etnografiska museet_ in Stockholm. Joests privéverzameling, met daarin ook veel voorwerpen uit Suriname, vormde na zijn dood de basis van het _Rautenstrauch-Joest-Museum_ in Keulen. 
    
    Voor de etnografische verzamelingen in Nederland was vooral de tentoonstelling over Nederlands West-Indië van belang. Voor deze tentoonstelling, die in 1899 werd gehouden in het Koloniaal Museum in Haarlem, verzamelde koloniaal ambtenaar [Louis Constant van Panhuys](https://nl.wikipedia.org/wiki/Louis_Constant_van_Panhuys) tijdens zijn stationering in Albina tussen 1893 en 1896 voorwerpen van met name Okanisi. Deze collectie bevindt zich vandaag de dag in de serie [TM-H](https://app.colonialcollections.nl/nl/objects?query=tm-h&locations=Suriname) van het Wereldmuseum Amsterdam.

    Directeur [Maurice Guffroy](https://www.wikidata.org/wiki/Q122165409) van de _Compagnie des mines d'or de la Guyane hollandaise_ [doneerde](https://collections.quaibranly.fr/?state=%7B%22matchAllCriteria%22%3Atrue%2C%22customSearchCriteria%22%3A%5B%7B%22field%22%3A%22%2FRecord%2FConX%2FAlphaSortConX%2C%2FRecord%2FConXother%2FAlphaSort%22%2C%22fieldLabel%22%3A%22%22%2C%22searchValues%22%3A%5B%22%5BGuffroy%2C%20Maurice%5D%22%5D%2C%22description%22%3A%22Personne%28s%29%20%3A%20Guffroy%2C%20Maurice%22%7D%5D%7D) in 1901 een omvangrijke collectie objecten van Wayana en Aluku aan het _Musée du Trocadéro_. Drie van de acht expedities naar Suriname die vlak na de eeuwwisseling onder auspiciën van het Koninklijk Nederlands Aardrijkskundig Genootschap werden georganiseerd leverden omvangrijke etnografische collecties op, die zich vandaag de dag bevinden in de collectie van het [Wereldmuseum Amsterdam](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2Fba9397040f2cf7f618e2180fb6c90208). De expeditie naar de Gonini uit 1903 leverde serie [TM-401](https://app.colonialcollections.nl/nl/objects?query=tm-401) met 86 voorwerpen op, de expeditie naar de Tapanahony uit 1904 serie [TM-402](https://app.colonialcollections.nl/nl/objects?query=tm-402) met 493 voorwerpen en de expeditie naar het Toemoek-Hoemakgebergte serie [TM-403](https://app.colonialcollections.nl/nl/objects?query=tm-403) met 186 voorwerpen. Expeditielid [Claudius de Goeje](https://nl.wikipedia.org/wiki/Claudius_Henricus_de_Goeje) droeg in 1904 een persoonlijke verzameling over aan het museum in Leiden, waar die is opgenomen onder serienummers [RV-1443](https://app.colonialcollections.nl/nl/objects?query=rv-1443) en [RV-1454](https://app.colonialcollections.nl/nl/objects?query=rv-1454).

    De door de Surinaamse broers Frederik Paul en Arthur Philip Penard van Cariben verzamelde collecties [RV-1817](https://app.colonialcollections.nl/nl/objects?query=rv-1817) en [RV-2349](https://app.colonialcollections.nl/nl/objects?query=rv-2349) werden in respectievelijk 1912 en 1937 geschonken aan het museum in Leiden. Tenslotte leverde de KNAG-expeditie in 1926 naar het Wilhelminagebergte door Gerold Stahel de serie [TM-416](https://app.colonialcollections.nl/nl/objects?query=tm-416) in het museum in Amsterdam op. 

    Eind 1923 opende in het Museum voor het Onderwijs te Den Haag, het huidige [Museon-Omniversum](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2Fa124abe580b6a77b82bb3edf0ca7113a), een tentoonstelling over Suriname. De voorwerpen die [Herman van Cappelle](https://nl.wikipedia.org/wiki/Herman_van_Cappelle_(geoloog)), de eerste directeur van het museum, had verzameld tijdens zijn verblijf in Suriname vormde hiervoor de basis. Hieronder bevond zich een [tweede _kwakwabangi_](https://hdl.handle.net/21.12123/43544), die nog steeds deel uitmaakt van de collectie van Museon-Omniversum. Ook het in 1915 geopende [Tropisch Landbouwmuseum in Deventer](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2F4006391907ec663bd03590d049851f84) had een bescheiden Surinamecollectie.
      
    #### Wetenschappelijk onderzoek tijdens het interbellum 
    Tijdens het interbellum groeide geleidelijk de wetenschappelijke belangstelling voor de samenlevingen van marrons en inheemsen. Het Amerikaanse antropologenechtpaar Melville J. en Frances Herskovits bezocht in 1928 en 1929 de Saamaka aan de bovenlopen van de Surinamerivier. Ongeveer tweehonderd van de objecten die zij verzamelden werden in 1929 geschonken aan het _Museum für Völkerkunde Hamburg_, het huidige _Museum am Rothenbaum – Kulturen und Künste der Welt_ (MARKK), waar de collectie het [serienummer 30.51](https://markk-hamburg.de/files/media/2020/06/MARKK-AM-ab-1921.pdf) heeft gekregen. De privécollectie die ze bij de bezoeken aanlegden bevindt zich nu in het [Schomburg Center for Research in Black Culture](https://digitalcollections.nypl.org/collections/71626000-12bb-013c-1a26-0242ac110002) in New York. De foto's worden bewaard in [Eliot Elisofon Photographic Archives, National Museum of African Art](https://sova.si.edu/record/eepa.1986-029). 
    
    In 1927, 1928 en 1930 [verzamelde](https://data.library.amnh.org/archives-authorities/id/amnhc_2000250) de Amerikaanse arts Morton Kahn voorwerpen in Suriname voor het [American Museum of Natural History](https://anthro.amnh.org/collections). De Franse industriëlen Marcel Monteux en Marc Richard financierden in 1931 een multidisciplinaire onderzoeksmissie naar Frans-Guyana, die een [verzameling](https://collections.quaibranly.fr/?state=%7B%22matchAllCriteria%22%3Atrue%2C%22customSearchCriteria%22%3A%5B%7B%22field%22%3A%22%2FRecord%2FEvenement%2FEvenement%22%2C%22fieldLabel%22%3A%22%22%2C%22searchValues%22%3A%5B%22Mission%20Monteux-Richard%20en%20Guyane%201931%22%5D%2C%22description%22%3A%22Ev%C3%A9nement%20historique%20%3A%20Mission%20Monteux-Richard%20en%20Guyane%201931%22%7D%5D%7D) voorwerpen opleverde die werd gedoneerd aan het _Musée du Trocadéro_. In 1934 [verzamelde](https://collections.quaibranly.fr/?state=%7B%22matchAllCriteria%22%3Atrue%2C%22customSearchCriteria%22%3A%5B%7B%22field%22%3A%22%2FRecord%2FConX%2FAlphaSortConX%2C%2FRecord%2FConXother%2FAlphaSort%22%2C%22fieldLabel%22%3A%22%22%2C%22searchValues%22%3A%5B%22%5BDamas%2C%20L%C3%A9on-Gontran%5D%22%5D%2C%22description%22%3A%22Personne%28s%29%20%3A%20Damas%2C%20L%C3%A9on-Gontran%22%7D%5D%7D) Leon-Gontran Damas, een student aan het Instituut voor Etnologie in Parijs die een jaar later met Aimé Césaire en Léopold Senghor de kiem zou leggen voor de _Négritude_-beweging, een omvangrijke collectie objecten langs de Marowijnerivier voor het _Musée du Trocadéro_. In 1937 werd Claudius de Goeje als onbezoldigd etnograaf en taalkundige toegevoegd aan de derde expeditie naar de zuidgrens van Suriname onder leiding van Conrad Carel Käyser. De verzameling die hij hierbij op kosten van de Nederlandse overheid aanlegde werd in 1938 en 1939 geschonken aan het Rijks Etnografisch Museum en bevindt zich nog steeds in het Wereldmuseum Leiden onder serienummers [RV-2352](https://app.colonialcollections.nl/nl/objects?query=rv-2352), [RV-2363](https://app.colonialcollections.nl/nl/objects?query=rv-2363) en [RV-2404](https://app.colonialcollections.nl/nl/objects?query=rv-2404). De Franse etnoloog Paul Sangnier [verzamelde](https://collections.quaibranly.fr/?state=%7B%22matchAllCriteria%22%3Atrue%2C%22customSearchCriteria%22%3A%5B%7B%22field%22%3A%22%2FRecord%2FConX%2FAlphaSortConX%2C%2FRecord%2FConXother%2FAlphaSort%22%2C%22fieldLabel%22%3A%22%22%2C%22searchValues%22%3A%5B%22%5BSangnier%2C%20Paul%5D%22%5D%2C%22description%22%3A%22Personne%28s%29%20%3A%20Sangnier%2C%20Paul%22%7D%5D%7D) eveneens in 1938 bij de Wayana en Aluku. 

    Van groot belang voor de verzamelingen in Nederland is het legaat uit 1940 van parkarchitect [Apollonius Johannes Reynvaan](https://www.wikidata.org/wiki/Q138794292), die in Nederland een omvangrijke collectie van 850 objecten uit Suriname aanlegde. De collectie van Reynvaan bevindt zich in het Wereldmuseum Leiden onder serienummer [RV-2452](https://app.colonialcollections.nl/nl/objects?query=rv-2452). 

    De expeditie in 1946 van de Franse geograaf Jean-Marcel Hurault naar het stroomgebied van de Marowijne maakte markeert in zekere zin een kantelpunt in de verzamelgeschiedenis van Suriname en Frans-Guyana. Hoewel een onderscheid niet altijd even scherp te maken is hebben de collecties die vanaf dat moment werden verzameld – niet toevallig ook het jaar waarin Frans-Guyana een overzees departement van Frankrijk werd – minder nadrukkelijk het karakter van het resultaat van een koloniale gebiedsverkenning. De objecten die Hurault langs de Marowijnerivier verzamelde werden na zijn dood in 2005 [ondergebracht](https://collections.quaibranly.fr/?state=%7B%22matchAllCriteria%22%3Atrue%2C%22customSearchCriteria%22%3A%5B%7B%22field%22%3A%22%2FRecord%2FConX%2FAlphaSortConX%2C%2FRecord%2FConXother%2FAlphaSort%22%2C%22fieldLabel%22%3A%22%22%2C%22searchValues%22%3A%5B%22%5BHurault%2C%20Jean-Marcel%5D%22%5D%2C%22description%22%3A%22Personne%28s%29%20%3A%20Hurault%2C%20Jean-Marcel%22%7D%5D%7D) in het _Musée du Quai Branly – Jacques Chirac_.

    Voor de collecties in Nederland vallen de vanaf de laten jaren veertig door [C. D. H. Eijgenberger](https://www.wikidata.org/wiki/Q138844151) verzamelde objecten en de geschenken aan koningin Juliana in het kader van haar bezoek in 1955 aan het autonome Suriname onder deze grenscategorie. De verzameling van Eijgenberger, met daarin zeldzame slavenboeien, werd in 1978 aangekocht door het Wereldmuseum Amsterdam en heeft daar serienummer [TM-4440](https://app.colonialcollections.nl/nl/objects?query=tm-4440) gekregen. De geschenken aan Juliana werden in 1957 ondergebracht in Museon-Omniversum. 
    
    Vanwege het ontbreken van een nadrukkelijk koloniale context vallen andere verzamelingen die na 1954 werden aangelegd buiten de scope van deze zoekhulp.

    ### Herkomstonderzoek

    Voor onderzoek naar de zendingen aan het Koninklijk Kabinet van Zeldzaamheden kunnen de [aanbevelingen in de zoekhulp van dat museum](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2Fcc7609accb9857dc8ca777ff1d6d4af1#herkomstonderzoek) worden opgevolgd.  

    ### Openstaande vragen

    * Volgens Vruggink en Paasman bezat het Nijmeegs Volkenkundig Museum de collectie van de Paters Redemptoristen. Is dit dezelfde collectie die zich nu in Museon-Omniversum bevindt?
    * Is de kwakwabangi uit de Artiscollectie verloren gegaan? 
    * Hoe verhoudt de kwakwabangi in Museon zich tot de kwakwabangi uit de collectie van Artis?
    
