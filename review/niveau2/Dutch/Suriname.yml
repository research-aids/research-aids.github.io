    ### Beschrijving
    
    Aan de noordkust van Zuid-Amerika monden verschillende rivieren uit in de Atlantische Oceaan in een gebied dat bekendstaat als de Guyana's – een inheems woord dat waarschijnlijk 'land van vele wateren' betekent. Een van deze rivieren is de Surinamerivier. Ten tijde van de reistochten van de Spaanse conquistador Alonso de Ojeda werd dit gebied bewoond door Arowakken, Cariben en Warau. Vanaf de late zestiende eeuw deden zeevaarders uit Engeland, Frankrijk en de Nederlanden het gebied aan, op zoek naar het mythische goudland _El Dorado_, dat volgens Sir Walter Raleigh in de Guyana's te vinden moest zijn. Langs de Surinamerivier werd in 1651 door Sir Frances Willoughby, de Engelse gouverneur van Barbados, een plantagekolonie gesticht. Deze kolonie werd in 1667 tijdens de Tweede Engels-Nederlandse Oorlog door een Zeeuwse vloot veroverd. 
    
    Vanaf 1683 werd Suriname bestuurd door de Sociëteit van Suriname, een particuliere onderneming met in gelijke verhoudingen de West-Indische Compagnie, de familie Van Aerssen van Sommelsdijck en de stad Amsterdam als aandeelhouders. In 1795 gingen de bezittingen van de Sociëteit van Suriname over op de Nederlandse staat, die Suriname – afgezien van twee periodes van Britse bezetting – als kolonie heeft bestuurd tot 1954. In dat laatste jaar aanvaardde Suriname samen met Nederland en de Nederlandse Antillen het Statuut voor het Koninkrijk der Nederlanden, waarmee de dekolonisatie voltooid heette te zijn. In 1975 werd Suriname onafhankelijk.

    De Europese particuliere eigenaren stelden op hun plantages tot slaaf gemaakte inheemsen en Afrikanen te werk. Sommige slaafgemaakten wisten de plantages te ontvluchten en in het binnenland van Suriname vrije samenlevingen te stichten. In 1760 sloot de koloniale overheid een vredesverdrag met een van deze marrongroepen, namelijk met de Okanisi (ook wel Aukaners of Ndyuka). In 1762 en 1769 volgden vredesverdragen met twee andere groepen, de Saamaka en Matawai, terwijl de Aluku (of Boni), de Pamaka en de Kwinti nooit een vredesverdrag sloten.

    Vanaf de achttiende eeuw waren zendelingen van de Evangelische Broedergemeente (EBG) actief in Suriname, vooral onder de Saamaka. In 1865 werd Suriname door paus Pius IX als missiegebied toegewezen aan Nederlandse redemptoristen, die in hun werkzaamheden werden bijgestaan door de Zusters Franciscanessen van Roosendaal en de Fraters van Tilburg. Vanuit de voormalige leprozenkolonie Batavia aan de Coppenamerivier werden inheemsen gekerstend, terwijl de missiestatie Tamarin aan de Cotticarivier het middelpunt werd van de katholieke missie naar de Okanisi.
    
    Cornelius van Coll, Wortelboer, Morssink noemen? 

    ### Verzamelingen Surinaamse voorwerpen in Europa en de Verenigde Staten
    Etnografische objecten werden vanaf het begin van de kolonisatie meegenomen naar Europa. In een in 1796 gepubliceerd verslag van veldtochten tegen marrons, waaraan de Schots-Nederlandse officier [John Gabriël Stedman](https://nl.wikipedia.org/wiki/John_Gabri%C3%ABl_Stedman) tussen 1773 en 1777 had deelgenomen, waren ook beschrijvingen en illustraties van etnografische voorwerpen opgenomen. Van Stedman is bekend dat hij in 1777 een schenking deed aan de stadhouderlijke verzameling van Willem V en in 1796 achttien Surinaamse 'curiositeiten' schonk aan James Parkinson voor opname in zijn [Leverian collection](https://en.wikipedia.org/wiki/Leverian_collection) in Londen, die in 1806 werd geveild. Aangezien in het archief van het Koninklijk Kabinet van Zeldzaamheden een inventarisbeschrijving is te vinden die rechtstreeks is overgenomen uit de objectbeschrijving in Stedmans verslag vermoeden antropologen Richard en Sally Price dat een deel van de door Stedman verzamelde voorwerpen uiteindelijk in het Koninklijk Kabinet van Zeldzaamheden terecht is gekomen. Het is echter vaak moeilijk een definitieve koppeling te maken tussen Stedmans beschrijving en illustraties en objecten uit het voormalige Kabinet van Zeldzaamheden.
    
    Een andere belangrijke verzameling voorwerpen uit Suriname werd in 1824 geschonken aan het Koninklijk Kabinet van Zeldzaamheden door het hoofd van de militaire geneeskundige dienst [Frederik Andreas Kühn](https://www.wikidata.org/wiki/Q132146744). Kühn schreef in de bij de schenking gevoegde brief dat een deel van de voorwerpen afkomstig was van zijn overleden broer, die in 1818 had deelgenomen aan een expeditie naar een marrongemeenschap; hierdoor is het niet altijd eenvoudig de schenking van Kühn te onderscheiden van objecten die eventueel van Stedman afkomstig kunnen zijn. Vanuit Suriname werd er tussen 1825 en 1835 ook aan het Kabinet geschonken door ambtenaar bij het Hof van Justitie [Isaac Bromet](https://www.wikidata.org/wiki/Q137830410), door Luthers predikant [Dietrich Kanngiesser](https://www.wikidata.org/wiki/Q94852739), door apotheker [Hendrik Haagen Dieperink](https://www.wikidata.org/wiki/Q122884501) en door president van het Hof van Justitie [Adriaan François Lammens](https://nl.wikipedia.org/wiki/Adriaan_Fran%C3%A7ois_Lammens). Lammens was schoonzoon en bewonderaar van [Gerrit Schouten](https://nl.wikipedia.org/wiki/Gerrit_Schouten) en verantwoordelijk voor de schenking van veel diorama's van Schouten aan het Kabinet.

    Zendelingen en missionarissen brachten eveneens etnografische voorwerpen naar Europa. Een van de oudste verzamelingen voorwerpen uit Suriname werd in 1780 door zendeling [Christlieb Quandt](https://www.wikidata.org/wiki/Q94933152) geschonken aan het rariteitenkabinet van de seminarie van de Evangelische Broedergemeente in Barby, terwijl zendeling [Johann Jansa](https://www.wikidata.org/wiki/Q119700090) rond 1857 een verzameling voorwerpen afkomstig uit de buurt van zendingspost Berg en Dal overdroeg aan de archivaris van de Evangelische Broedergemeente in Herrnhut. Hoewel veel door Quandt en Jansa verzamelde voorwerpen uiteindelijk terecht zouden komen in het in 1878 opgerichte [Völkerkundemuseum Herrnhut](https://voelkerkunde-herrnhut.skd.museum) vormde de verkoop van etnografica ook een bron van inkomsten voor de Evangelische Broedergemeente. Een aantal door Jansa verzamelde voorwerpen werd bijvoorbeeld in 1861 verkocht aan het etnografisch kabinet van de Koninklijke Pruisische Kunstkamer, dat in 1873 op zou gaan in het _Ethnologisches Museum_ van Berlijn. Een collectie van de paters redemptoristen bevindt zich in [Museon-Omniversum](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2Fa124abe580b6a77b82bb3edf0ca7113a) CHECKEN OF DIT DE COLLECTIE IS DIE EERST IN HET NIJMEEGS VOLKENKUNDIG MUSEUM WAS ONDERGEBRACHT. De Fraters van Tilburg brachten een omvangrijke [fotocollectie Caribisch Erfgoed](https://stadsmuseumtilburg.nl/collecties?query=*:*&qf%5b%5d=tib_collectionPart_facet:Foto%27s%20Caribisch%20Erfgoed) samen, die digitaal is ontsloten door het Stadsmuseum Tilburg.

    Verdere negentiende-eeuwse verzamelingen betreffen onder meer de door gouverneur van Suriname Cornelis Ascanius van Sypesteyn en administrateur der financiën in Suriname [Schimmelpenninck van der Oye](https://nl.wikipedia.org/wiki/Assueer_Jacob_Schimmelpenninck_van_der_Oye_(1835-1915)) samengebrachte collecties [RV-399](https://app.colonialcollections.nl/nl/objects?query=rv-399) en [RV-1054](https://app.colonialcollections.nl/nl/objects?query=rv-1054)). Beide collecties werden in respectievelijk 1883 en 1895 geschonken aan het Rijks Ethnographisch Museum, het huidige [Wereldmuseum Leiden](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2F77c1a0cf982b33b9e88073c4a704049b). Ook het [Etnografisch Museum Artis](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2F44a7a61d62ca8589d6a93e6fde593593) bezat een uitgebreide collectie voorwerpen uit Suriname, waaronder een zeldzame _kwakwabangi_, waarover conservator Cornelis Marinus Pleyte in 1896 [een artikel](https://www.digi-hub.de/viewer/image/DE-11-001785756/394/LOG_0381/) publiceerde in het Duitse tijdschrift _Globus_. Deze collectie ging in 1921 over naar het in 1926 geopende museum van het Koloniaal Instituut, het huidige Wereldmuseum Amsterdam, waar de collectie nog steeds te herkennen is aan de serieletters [TM-A](https://app.colonialcollections.nl/nl/objects?query=tm-a&locations=Suriname).

    In de alinea hierboven ook van Ghert (RV-951, schenking 1893) noemen? Waar Berends noemen (RV-1749, schenking 1910)? 
    
    (Ook verzameling in Surinaams Museum?)

    #### Verkenningen langs de rivieren
    Vanwege goudvondsten in het stroomgebied van de Marowijnerivier kwam Suriname vanaf de late jaren 70 van de negentiende eeuw internationaal steeds meer in de belangstelling te staan. Samen met de Aluku gids en bootsman [Apatou](https://nl.wikipedia.org/wiki/Apatou_(kapitein)) reisde de Franse arts Jules Crevaux in 1877 via de bovenlopen van de Marowijne naar Belém in Brazilië. Crevaux [schonk](https://collections.quaibranly.fr/?state={"matchAllCriteria":true,"customSearchCriteria":[{"field":"/Record/ConX/AlphaSortConX,/Record/ConXother/AlphaSort","fieldLabel":"","searchValues":["[Crevaux, Jules]"],"description":"Personne(s) : Crevaux, Jules"}]}) de etnografische voorwerpen die hij tijdens de reis had verzameld aan het _Musée du Trocadéro_ in Parijs, een van de voorlopers van het huidige _Musée du Quai Branly – Jacques Chirac_. Hetzelfde gebeurde met de [objecten](https://collections.quaibranly.fr/?state=state_1639296188) die archeoloog en antropoloog Lucien Fournereau in 1882 langs de Marowijne verzamelde. De voorwerpen uit Suriname die tijdens de Wereldtentoonstelling van 1878 in Parijs en de [Wereldtentoonstelling van 1883](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2F6ad17cc1c619926c9a449872d3c41b0f) in Amsterdam aan het publiek waren getoond werden na afloop over volkenkundige musea verdeeld; in Nederland leverde dat onder meer de series [RV-300](https://app.colonialcollections.nl/nl/objects?query=rv-300) en [RV-370](https://app.colonialcollections.nl/nl/objects?query=rv-370) op. 
    
    Tussen mei 1885 en juli 1886 reisde [Herman ten Kate](https://nl.wikipedia.org/wiki/Herman_ten_Kate_(antropoloog)) naar Suriname om voor hetzelfde Rijks Ethnographisch Museum een verzameling objecten bijeen te brengen die zich vandaag de dag nog steeds in het Wereldmuseum Leiden bevindt in de serie [RV-581](https://app.colonialcollections.nl/nl/objects?query=rv-581). De voorwerpen die de Leidse hoogleraar geologie Karl Martin in dezelfde periode verzamelde bij inheemsen en Saamaka zouden in 1949 door zijn weduwe Hillegonda Martin-Icke eveneens worden gedoneerd aan het Wereldmuseum Leiden, waar die het serienummer [RV-2777](https://app.colonialcollections.nl/nl/objects?query=rv-2777) hebben gekregen. In 1887 gidste Apatou opnieuw een Fransman, namelijk geograaf en koloniaal ambtenaar Henri Coudreau, langs de bovenlopen van de Marowijne. Ook Coudreau zou de verzamelde voorwerpen [schenken](https://collections.quaibranly.fr/?state={"matchAllCriteria":true,"customSearchCriteria":[{"field":"/Record/ConX/AlphaSortConX,/Record/ConXother/AlphaSort","fieldLabel":"","searchValues":["[Coudreau, Henri]"],"description":"Personne(s) : Coudreau, Henri"}]}) aan het _Musée du Trocadéro_. Legerarts [John H. Spitzly](https://www.wikidata.org/wiki/Q137806783) schonk in 1888 een verzameling etnografische voorwerpen uit Suriname aan het _Berliner Gesellschaft für Anthropologie, Ethnologie und Urgeschichte_.

    De onderzoeksreizen in 1890 van de Duitse Wilhelm Joest en de Zweedse Axel Klinckowström resulteerden in schenkingen aan respectievelijk het _Ethnologisches Museum_ in Berlijn en het _Etnografiska museet_ in Stockholm. Joests privéverzameling, met daarin ook veel voorwerpen uit Suriname, zou na zijn dood de basis vormen van het _Rautenstrauch-Joest-Museum_ in Keulen. Voor de etnografische verzamelingen in Nederland was vooral de in 1899 in het Koloniaal Museum in Haarlem gehouden tentoonstelling over Nederlands West-Indië van belang. Koloniaal ambtenaar [Louis Constant van Panhuys](https://nl.wikipedia.org/wiki/Louis_Constant_van_Panhuys) verzamelde tijdens zijn stationering in Albina tussen 1893 en 1896 voor deze tentoonstelling voorwerpen van met name Okanisi. Deze verzameling voorwerpen bevindt zich vandaag de dag in de serie [TM-H](https://app.colonialcollections.nl/nl/objects?query=tm-h&locations=Suriname) van het Wereldmuseum Amsterdam.

    Drie van de acht expedities naar Suriname die vlak na de eeuwwisseling onder auspiciën van het Koninklijk Nederlands Aardrijkskundig Genootschap werden georganiseerd leverden omvangrijke etnografische collecties op, die zich vandaag de dag bevinden in de collectie van het [Wereldmuseum Amsterdam](https://app.colonialcollections.nl/nl/research-aids/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2Fba9397040f2cf7f618e2180fb6c90208). De expeditie naar de Gonini uit 1903 leverde serie [TM-401](https://app.colonialcollections.nl/nl/objects?query=tm-401) met 86 voorwerpen op, de expeditie naar de Tapanahony uit 1904 serie [TM-402](https://app.colonialcollections.nl/nl/objects?query=tm-402) met 493 voorwerpen en de expeditie naar het Toemoek-Hoemakgebergte serie [TM-403](https://app.colonialcollections.nl/nl/objects?query=tm-403) met 186 voorwerpen. Expeditielid Claudius de Goeje schonk in 1904 een tijdens de expeditie aangelegde persoonlijke verzameling aan het Rijks Etnografisch Museum, die zich nu in de collectie van het Wereldmuseum Leiden bevindt onder serienummers [RV-1443](https://app.colonialcollections.nl/nl/objects?query=rv-1443) en [RV-1454](https://app.colonialcollections.nl/nl/objects?query=rv-1454).

    De etnografische voorwerpen die de Surinaamse broers Frederik Paul en Arthur Philip Penard verzamelden bij Cariben werden in 1912 en 1937 geschonken aan het Rijks Etnografisch Museum, die zich nu in de collectie van het Wereldmuseum Leiden bevindt onder serienummers[RV-1817](https://app.colonialcollections.nl/nl/objects?query=rv-1817) en [RV-2349](https://app.colonialcollections.nl/nl/objects?query=rv-2349). Tenslotte leverde de KNAG-expeditie in 1926 naar het Wilhelminagebergte door Gerold Stahel de serie [TM-416](https://app.colonialcollections.nl/nl/objects?query=tm-416) op.
    
    De Goeje: RV-2804 (schenking 1949).    
      
    #### Vroege antropologische/wetenschappelijke verzamelingen
    Het Amerikaanse antropologenechtpaar Melville J. en Frances Herskovits bezocht in 1928 en 1929 de Saamaka aan de bovenlopen van de Surinamerivier. Ongeveer 200 objecten die tijdens dit bezoek werden verzameld werden in 1929 geschonken aan het _Museum für Völkerkunde Hamburg_, het huidige _Museum am Rothenbaum – Kulturen und Künste der Welt_, waar de collectie het [serienummer 30.51](https://markk-hamburg.de/files/media/2020/06/MARKK-AM-ab-1921.pdf) heeft gekregen. De persoonlijke? collectie die ze bij de bezoeken aanlegden werd gedoneerd aan het Field Museum of Chicago, maar bevinden zich nu in het [Schomburg Center for Research in Black Culture](https://digitalcollections.nypl.org/collections/71626000-12bb-013c-1a26-0242ac110002) in New York; de foto's bevinden zich in [Eliot Elisofon Photographic Archives, National Museum of African Art](https://sova.si.edu/record/eepa.1986-029). 
    
    In 1927, 1928 en 1930 [verzamelde](https://data.library.amnh.org/archives-authorities/id/amnhc_2000250) de Amerikaanse arts Morton Kahn voorwerpen voor het American Museum of Natural History, waar deze zich [nog steeds bevinden](https://anthro.amnh.org/collections). In 1934 [verzamelde](https://collections.quaibranly.fr/?state={"matchAllCriteria":true,"customSearchCriteria":[{"field":"/Record/ConX/AlphaSortConX,/Record/ConXother/AlphaSort","fieldLabel":"","searchValues":["[Damas, Léon-Gontran]"],"description":"Personne(s) : Damas, Léon-Gontran"}]}) Leon-Gontran Damas, een student aan het Instituut voor Etnologie in Parijs die een jaar later met Aimé Césaire en Léopold Senghor de kiem zou leggen voor de _Négritude_-beweging, een omvangrijke collectie objecten langs de Marowijnerivier voor het _Musée du Trocadéro_ in opdracht van zijn hoogleraren Paul Rivet en Marcel Mauss. In 1937 wordt Claudius de Goeje als onbezoldigd etnograaf en taalkundige toegevoegd aan de derde expeditie naar de zuidgrens van Suriname onder leiding van Conrad Carel Käyser. De verzameling die hij hierbij op kosten van de Nederlandse aanlegde werd in 1938 en 1939 geschonken aan het Rijks Etnografisch Museum en bevindt zich nog steeds in het Wereldmuseum Leiden onder serienummers [RV-2352](https://app.colonialcollections.nl/nl/objects?query=rv-2352), [RV-2363](https://app.colonialcollections.nl/nl/objects?query=rv-2363) en [RV-2404](https://app.colonialcollections.nl/nl/objects?query=rv-2404). De Franse etnoloog Paul Sangnier [verzamelde](https://collections.quaibranly.fr/?state={"matchAllCriteria":true,"customSearchCriteria":[{"field":"/Record/ConX/AlphaSortConX,/Record/ConXother/AlphaSort","fieldLabel":"","searchValues":["[Sangnier, Paul]"],"description":"Personne(s) : Sangnier, Paul"}]}) eveneens in 1938 bij de Wayana en Aluku. 

    Van groot belang voor de verzamelingen in Nederland is het legaat uit 1940 van parkarchitect [Apollonius Johannes Reynvaan](https://www.wikidata.org/wiki/Q138794292), die in Nederland een omvangrijke collectie van 850 objecten uit Suriname aanlegde. De collectie van Reynvaan bevindt zich in het Wereldmuseum Leiden onder serienummer [RV-2452](https://app.colonialcollections.nl/nl/objects?query=rv-2452). De collectie slavenboeien die 

    De expeditie die de Franse geograaf Jean-Marcel Hurault in 1946 in het stroomgebied van de Marowijne maakte vormt in zekere zin een kantelmoment in de verzamelgeschiedenis van Suriname en Frans-Guyana. Hoewel een onderscheid niet altijd even duidelijk is te maken hebben de collecties die vanaf dat moment werden verzameld – niet toevallig ook het jaar waarin Frans-Guyana een overzees departement van Frankrijk werd – een minder nadrukkelijker koloniaal karakter. De objecten die Hurault langs de Marowijnerivier verzamelde werden na zijn dood in 2005 [ondergebracht](https://collections.quaibranly.fr/?state={"matchAllCriteria":true,"customSearchCriteria":[{"field":"/Record/ConX/AlphaSortConX,/Record/ConXother/AlphaSort","fieldLabel":"","searchValues":["[Hurault, Jean-Marcel]"],"description":"Personne(s) : Hurault, Jean-Marcel"}]}) in het _Musée du Quai Branly – Jacques Chirac_.


    
    
