Level: 2

Title: "Suriname aanvullingen"

Abstract: "In Nederlandse museumcollecties zijn etnografische voorwerpen te vinden die afkomstig zijn uit Suriname. Veel van deze voorwerpen zijn verworven in een koloniale context. In deze zoekhulp vind je informatie over de meest voorkomende manieren waarop deze voorwerpen in collecties in Nederland en andere landen in het mondiale noorden terecht zijn gekomen."

