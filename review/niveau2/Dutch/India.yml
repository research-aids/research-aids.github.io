Main-text:
  content: >
    ### Beschrijving

    Volgens Hans Groot (Van Batavia naar Weltevreden, p. 222, p. 229) schonk de resident van Bengalen [Daniel Anthony Overbeek](https://en.wikipedia.org/wiki/Daniel_Anthony_Overbeek) in mei 1825 een zilveren Visnu uit Birma aan het Bataviaasch Genootschap. De arts Jacobus Reinier Vos uit Bengalen was ook corresponderend lid en schonk boeken. [Vos](https://kzgwonline.nl/persoon/vos-jacobus-reinier) [schonk](https://kzgwonline.nl/collecties/collectie-j-r-vos) ook aan het KZGW. [Artikel over Vos in tijdschrift Zeeland](https://zoeken.collectiezeeland.nl/issue/zld/2021-09-01/edition/null/page/41)

    De grafborden van de voormalige Nederlandse kerk van Chinsurah zijn in 1949 door de bisschop van Kolkata geschonken aan het Rijksmuseum Amsterdam: NG-106 tot en met NG-118.

    Koperen platen uit het Chola-rijk werden in 2026 gerestitueerd [advies en bijlagen Commissie Koloniale Collecties](https://commissie.kolonialecollecties.nl/documenten/2026/05/16/india-2026)

    [Schilderij](https://id.rijksmuseum.nl/20067545) van Joan Ketelaars ambassade naar de koning van Udaipur (nog niet op de Datahub)

    [TM-A-9584](https://app.colonialcollections.nl/nl/objects/https%3A%2F%2Fn2t%252Enet%2Fark%3A%2F27023%2F70344acb0575923e25b4ff07ea8e35a7)

    KZGW: [Waaiers](https://kzgwonline.nl/records/waaiers-uit-bengalen) uit Bengalen, geschonken door Nicolaas Hugenholtz

    #### KZGW

    - [Schenkingen](https://kzgwonline.nl/persoon/moens-adriaan) van [Adriaan Moens](https://nl.wikipedia.org/wiki/Adriaan_Moens)
    - Potje van versteend hout, [geschonken](https://kzgwonline.nl/records/potje-van-versteend-hout) door Jacob Noels van Serooskerke, afkomstig uit Sri Lanka of India
    - [Schenkingen](https://kzgwonline.nl/persoon/s-gravezande-adrianus) van Adrianus 's-Gravezande

    ### Natuurhistorisch verzamelen?

    - Artikel: [De katten van Suratte](https://kzgw.nl/wp-content/uploads/2015/07/ZLD-26.1-t-Is-vol-van-Schatten-H.-Nijhuis.pdf)

